services:
  - type: web
    name: fitzone
    env: python
    buildCommand: |
      apt-get update
      apt-get install -y --no-install-recommends \
        libjpeg-dev libpng-dev libtiff-dev libfreetype6-dev liblcms2-dev libwebp-dev libopenjp2-7-dev libharfbuzz-dev libfribidi-dev libxcb1-dev pkg-config build-essential
      pip install --upgrade pip setuptools wheel
      pip install --prefer-binary -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: "gunicorn fitzone.wsgi:application --bind 0.0.0.0:$PORT"
    autoDeploy: true
    region: oregon
    plan: standard
    
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PORT
        value: "8000"
      - key: DJANGO_SETTINGS_MODULE
        value: fitzone.settings
      - key: DEBUG
        value: "false"
      - key: RENDER
        value: "true"
      - key: DISABLE_COLLECTSTATIC
        value: "0"
      
      # Database (auto-provisioned PostgreSQL)
      - key: DATABASE_URL
        fromDatabase:
          name: fitzone
          property: connectionString
      
      # Secret Key (generate with: python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())")
      - key: SECRET_KEY
        sync: false
      
      # Email Configuration
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "true"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      
      # SITE_URL for email links (reset password, contact support, etc.)
      - key: SITE_URL
        value: "https://fitzone.onrender.com"
      
      # Optional runtime settings
      - key: HEALTH_CHECK_PATH
        value: "/healthz"
      
      # Razorpay Configuration
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      
      # Static Files
      - key: STATIC_URL
        value: "/static/"
      - key: STATICFILES_STORAGE
        value: "whitenoise.storage.CompressedManifestStaticFilesStorage"
      
      # Security Settings
      - key: ALLOWED_HOSTS
        value: "fitzone.onrender.com,localhost,127.0.0.1"
      - key: SECURE_SSL_REDIRECT
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: CSRF_COOKIE_SECURE
        value: "true"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "true"

databases:
  - name: fitzone
    plan: starter
    region: oregon
    postgresMajorVersion: "15"
