<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0 }
        .container{max-width:600px;margin:20px auto;background:#fff;padding:24px;border-radius:8px}
        .header{background:linear-gradient(135deg,#00D09C,#0ea37a);color:#fff;padding:20px;border-radius:6px}
        .btn{display:inline-block;padding:10px 18px;background:#00D09C;color:#031B16;border-radius:6px;text-decoration:none;font-weight:700}
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>Account Reactivated</h1></div>
    <p>Hi {{ username }},</p>
    <p>Your FitZone account has been reactivated by our support team. You can now log in and continue your fitness journey.</p>
    <p><a class="btn" href="{{ dashboard_url }}">Go to Dashboard</a></p>
    <p>If you did not request this, contact support immediately.</p>
    <p>— FitZone Team</p>
</div>
</body>
</html>
