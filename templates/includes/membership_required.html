<script>
    // Add animation on scroll
    document.addEventListener('DOMContentLoaded', function() {
        const card = document.querySelector('.membership-required-card');
        if (card) {
            // Add intersection observer for scroll animation
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };
            
            const observer = new IntersectionObserver(function(entries) {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);
            
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
            observer.observe(card);
        }
        
        // Add click handlers for buttons with loading state
        const buttons = document.querySelectorAll('.btn-primary, .btn-secondary');
        buttons.forEach(button => {
            button.addEventListener('click', function(e) {
                // Optional: Add loading state on click
                // Uncomment the lines below to enable loading state

                if (!this.classList.contains('loading')) {
                    e.preventDefault();
                    this.classList.add('loading');
                    setTimeout(() => {
                        window.location.href = this.href;
                    }, 500);
                }
                */
            });
        });
    });
</script>
