<div class="py-0">
    <div class="bg-[#1A1A2E] rounded-2xl border border-[#E94560]/20 p-12 text-center max-w-2xl mx-auto">
        <div class="w-20 h-20 bg-[#E94560]/20 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-lock text-[#E94560] text-4xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-white mb-4">{{ membership_alert_title|default:'Membership Required' }}</h2>
        <p class="text-text-gray mb-6">{{ membership_alert_message|default:'You need an active membership to access this feature. Choose a plan that best suits your fitness goals!' }}</p>
        <div class="flex flex-wrap gap-4 justify-center">
            <a href="{% url 'membership:plans' %}" class="bg-[#E94560] text-white px-6 py-2 rounded-lg font-semibold hover:bg-opacity-80 transition-all">
                <i class="fas fa-crown mr-2"></i> View Membership Plans
            </a>
            <a href="{% url 'dashboard' %}" class="border border-[#E94560] text-[#E94560] px-6 py-2 rounded-lg hover:bg-[#E94560] hover:text-white transition-all">
                <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>
