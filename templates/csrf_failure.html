{% extends 'base/base.html' %}

{% block title %}CSRF Failure{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto py-12 px-4">
    <div class="bg-white shadow rounded-lg p-8">
        <h1 class="text-3xl font-bold mb-4">CSRF Verification Failed</h1>
        <p class="mb-4">Your request was blocked because the security token could not be verified.</p>
        <div class="bg-gray-100 p-4 rounded-lg">
            <h2 class="font-semibold mb-2">Reason</h2>
            <p>{{ reason }}</p>
        </div>
        <div class="mt-6">
            <a href="{% url 'login' %}" class="text-blue-600 underline">Return to login</a>
        </div>
    </div>
</div>
{% endblock %}
