{% extends 'base/base.html' %}
{% load static %}

{% block title %}Upgrade Membership - FitZone{% endblock %}

{% block extra_css %}
<style>
	/* ============================================
	   PROFESSIONAL STYLING FOR UPGRADE PAGE
	============================================ */
    
	.fade-in {
		animation: fadeIn 0.5s ease-out;
	}
    
	@keyframes fadeIn {
		from { opacity: 0; transform: translateY(20px); }
		to { opacity: 1; transform: translateY(0); }
	}
    
	/* Plan Comparison Cards */
	.plan-comparison {
		display: grid;
		grid-template-columns: 1fr auto 1fr;
		gap: 1.5rem;
		align-items: stretch;
		margin: 2rem 0;
	}
    
	.plan-card {
		background: #1A1A2E;
		border: 1px solid rgba(233, 69, 96, 0.2);
		border-radius: 16px;
		padding: 1.5rem;
		transition: all 0.3s ease;
		position: relative;
		overflow: hidden;
	}
    
	.plan-card:hover {
		transform: translateY(-4px);
		box-shadow: 0 12px 40px rgba(233, 69, 96, 0.15);
	}
    
	.plan-card.current {
		border-color: rgba(233, 69, 96, 0.3);
	}
    
	.plan-card.new {
		border-color: #00D09C;
		border-width: 2px;
	}
    
	.plan-card.new::before {
		content: ''; 
		position: absolute;
		top: -50%;
		right: -50%;
		width: 100%;
		height: 100%;
		background: radial-gradient(circle, rgba(0, 208, 156, 0.05), transparent 70%);
		pointer-events: none;
	}
    
	.plan-badge {
		display: inline-block;
		padding: 0.25rem 0.75rem;
		border-radius: 9999px;
		font-size: 0.6rem;
		font-weight: 700;
		text-transform: uppercase;
		letter-spacing: 0.5px;
	}
    
	.plan-badge.current {
		background: rgba(233, 69, 96, 0.15);
		color: #E94560;
	}
    
	.plan-badge.new {
		background: rgba(0, 208, 156, 0.15);
		color: #00D09C;
	}
    
	.plan-price {
		font-size: 2.5rem;
		font-weight: 700;
		color: #E94560;
	}
    
	.plan-price.new-price {
		color: #00D09C;
	}
    
	.plan-price small {
		font-size: 0.875rem;
		font-weight: 400;
		color: #A0A0A0;
	}
    
	/* Arrow Divider */
	.arrow-divider {
		display: flex;
		align-items: center;
		justify-content: center;
		color: #E94560;
		font-size: 2rem;
		padding: 0 0.5rem;
		animation: pulseArrow 2s infinite;
	}
    
	@keyframes pulseArrow {
		0%, 100% { transform: translateX(0); opacity: 1; }
		50% { transform: translateX(8px); opacity: 0.7; }
	}
    
	/* Pricing Breakdown */
	.pricing-breakdown {
		background: linear-gradient(135deg, rgba(17, 24, 39, 0.9), rgba(26, 26, 46, 0.9));
		border-left: 4px solid #E94560;
		padding: 1.25rem;
		border-radius: 12px;
		margin: 1.5rem 0;
	}
    
	.breakdown-row {
		display: flex;
		justify-content: space-between;
		padding: 0.4rem 0;
		color: #D4D4D8;
		font-size: 0.9rem;
	}
    
	.breakdown-total {
		border-top: 2px solid rgba(233, 69, 96, 0.3);
		padding-top: 0.75rem;
		margin-top: 0.75rem;
		font-weight: 700;
		color: #E94560;
		font-size: 1.1rem;
	}
    
	/* Features List */
	.feature-list {
		list-style: none;
		padding: 0;
		margin: 1rem 0;
	}
    
	.feature-list li {
		display: flex;
		align-items: center;
		gap: 0.5rem;
		color: #A0A0A0;
		font-size: 0.85rem;
		padding: 0.3rem 0;
	}
    
	.feature-list li i {
		color: #00D09C;
		font-size: 0.75rem;
		width: 1.25rem;
	}
    
	/* Upgrade Button */
	.upgrade-btn {
		display: inline-flex;
		align-items: center;
		justify-content: center;
		gap: 0.75rem;
		width: 100%;
		padding: 0.875rem 1.5rem;
		border-radius: 12px;
		font-weight: 600;
		font-size: 1rem;
		transition: all 0.3s ease;
		border: none;
		cursor: pointer;
		text-decoration: none;
	}
    
	.upgrade-btn i {
		margin-right: 0.5rem;
	}
    
	.upgrade-btn.primary {
		background: linear-gradient(135deg, #E94560, #c72a4a);
		color: white;
		box-shadow: 0 4px 20px rgba(233, 69, 96, 0.3);
	}
    
	.upgrade-btn.primary:hover {
		transform: translateY(-2px);
		box-shadow: 0 8px 30px rgba(233, 69, 96, 0.4);
	}
    
	.upgrade-btn.primary:disabled {
		opacity: 0.6;
		cursor: not-allowed;
		transform: none !important;
	}
    
	.upgrade-btn.success {
		background: linear-gradient(135deg, #00D09C, #00a87c);
		color: white;
		box-shadow: 0 4px 20px rgba(0, 208, 156, 0.3);
	}
    
	.upgrade-btn.success:hover {
		transform: translateY(-2px);
		box-shadow: 0 8px 30px rgba(0, 208, 156, 0.4);
	}
    
	.btn-spinner {
		display: inline-block;
		width: 20px;
		height: 20px;
		border: 2px solid rgba(255,255,255,0.3);
		border-top-color: white;
		border-radius: 50%;
		animation: spin 0.6s linear infinite;
	}
    
	@keyframes spin {
		to { transform: rotate(360deg); }
	}
    
	/* Savings Badge */
	.savings-badge {
		display: inline-flex;
		align-items: center;
		gap: 0.5rem;
		background: rgba(0, 208, 156, 0.15);
		color: #00D09C;
		padding: 0.35rem 0.75rem;
		border-radius: 9999px;
		font-size: 0.7rem;
		font-weight: 600;
		margin-top: 0.5rem;
	}
    
	/* Upgrade underline bar */
	.upgrade-underline { 
		margin-top: 0.75rem; 
	}
    
	.upgrade-underline .bar { 
		height: 6px; 
		border-radius: 9999px; 
		transition: width 0.4s ease; 
		background: #00D09C; 
	}
    
	.progress-bar-wrapper {
		margin-top: 0.75rem;
	}
    
	.progress-bar-wrapper .bar {
		height: 6px;
		border-radius: 9999px;
		transition: width 0.4s ease;
		background: #E94560;
	}
    
	/* Toast Notification */
	.toast {
		position: fixed;
		bottom: 2rem;
		right: 2rem;
		padding: 1rem 1.5rem;
		border-radius: 12px;
		color: white;
		font-weight: 500;
		z-index: 9999;
		max-width: 400px;
		box-shadow: 0 10px 40px rgba(0,0,0,0.3);
		animation: slideUp 0.3s ease-out;
		display: none;
	}
    
	.toast.success { background: #00D09C; }
	.toast.error { background: #E94560; }
	.toast.info { background: #3B82F6; }
    
	@keyframes slideUp {
		from { opacity: 0; transform: translateY(20px); }
		to { opacity: 1; transform: translateY(0); }
	}
    
	/* Responsive */
	@media (max-width: 1024px) {
		.plan-comparison {
			gap: 1rem;
		}
		.plan-card {
			padding: 1.25rem;
		}
		.plan-price {
			font-size: 2rem;
		}
	}
    
	@media (max-width: 768px) {
		.plan-comparison {
			grid-template-columns: 1fr;
			gap: 0.75rem;
		}
		.arrow-divider {
			transform: rotate(90deg);
			padding: 0.25rem 0;
			font-size: 1.5rem;
		}
		.plan-card {
			padding: 1rem;
		}
		.plan-price {
			font-size: 1.75rem;
		}
		.pricing-breakdown {
			padding: 1rem;
		}
		.breakdown-row {
			font-size: 0.8rem;
		}
		.breakdown-total {
			font-size: 1rem;
		}
	}
    
	@media (max-width: 480px) {
		.plan-card {
			padding: 0.875rem;
		}
		.plan-price {
			font-size: 1.5rem;
		}
		.plan-label {
			font-size: 0.7rem;
		}
		.feature-list li {
			font-size: 0.75rem;
		}
		.upgrade-btn {
			font-size: 0.875rem;
			padding: 0.75rem;
		}
		.pricing-breakdown {
			padding: 0.875rem;
		}
	}
</style>

{% endblock %}

{% block content %}
{% include 'membership/upgrade.html' %}
{% endblock %}
